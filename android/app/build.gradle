

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'dev.flutter.flutter-gradle-plugin'
apply plugin: 'com.google.gms.google-services'
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def hasReleaseKeystore =
        keystoreProperties['storeFile'] &&
        keystoreProperties['keyAlias'] &&
        keystoreProperties['keyPassword'] &&
        keystoreProperties['storePassword']
def isReleaseTask = gradle.startParameter.taskNames.any {
    it.toLowerCase().contains("release") || it.toLowerCase().contains("bundle")
}

android {
    namespace "com.pixelsmart.nic_pre_u"
    compileSdkVersion 36
    ndkVersion "28.0.12433566"

    defaultConfig {
        applicationId "com.pixelsmart.nic_pre_u"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 24 //incrementar para cada publicacion
        versionName '1.1.9' //incrementar por ejemplo el 1.0.+
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            } else if (isReleaseTask) {
                throw new GradleException("Falta android/key.properties con storeFile, keyAlias, keyPassword y storePassword para generar el release de Play Console.")
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // --- Forzar CameraX 16 KB ready ---
    implementation "androidx.camera:camera-core:1.4.1"
    implementation "androidx.camera:camera-camera2:1.4.1"
    implementation "androidx.camera:camera-lifecycle:1.4.1"
    implementation "androidx.camera:camera-view:1.4.1"
    implementation "androidx.camera:camera-mlkit-vision:1.4.1" // si tu plugin la usa
}

configurations.all {
    resolutionStrategy.eachDependency { d ->
        if (d.requested.group == "androidx.camera") {
            d.useVersion("1.4.1") // o superior estable si la tienes
        }
    }
}
